# fm finetune — frozen-encoder finetune of the 3 dielectric targets from a pre_o* step
# checkpoint (--checkpoint). epochs=100 + early stopping (the default 20 risks undertraining,
# which would confound the task-scaling signal).
#
# GENERATED by make_configs.py — edit that script, not this file.

[data]
composition_column = "composition"
val_split = 0.1
test_split = 0.1
split_random_seed = 42
batch_size = 256
num_workers = 0

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20260515.pd.parquet"

[datasets.magnetic]
path = "data/NEMAD_magnetic_20260419_norm.parquet"

[datasets.superconductor]
path = "data/NEMAD_superconductor_20260425_norm.parquet"

[datasets.phonix]
path = "data/phonix-db-filtered_20260425_norm.parquet"

# ---- qc regression (9) ----
[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "efermi"
kind = "regression"
dataset = "qc"
column = "Efermi (normalized)"

[[tasks]]
name = "final_energy"
kind = "regression"
dataset = "qc"
column = "Final energy per atom (normalized)"

[[tasks]]
name = "total_magnetization"
kind = "regression"
dataset = "qc"
column = "Total magnetization (normalized)"

[[tasks]]
name = "volume"
kind = "regression"
dataset = "qc"
column = "Volume (normalized)"

[[tasks]]
name = "dielectric_total"
kind = "regression"
dataset = "qc"
column = "Dielectric total (normalized)"

[[tasks]]
name = "dielectric_ionic"
kind = "regression"
dataset = "qc"
column = "Dielectric ionic (normalized)"

[[tasks]]
name = "dielectric_electronic"
kind = "regression"
dataset = "qc"
column = "Dielectric electronic (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

# ---- NEMAD magnetic regression (4) ----
[[tasks]]
name = "magnetization"
kind = "regression"
dataset = "magnetic"
column = "Magnetization (normalized)"

[[tasks]]
name = "curie"
kind = "regression"
dataset = "magnetic"
column = "Curie temperature (normalized)"

[[tasks]]
name = "neel"
kind = "regression"
dataset = "magnetic"
column = "Neel temperature (normalized)"

[[tasks]]
name = "magnetic_moment"
kind = "regression"
dataset = "magnetic"
column = "Magnetic moment (normalized)"

# ---- NEMAD superconductor regression (1) ----
[[tasks]]
name = "tc"
kind = "regression"
dataset = "superconductor"
column = "Transition temperature (normalized)"

# ---- phonix regression (2) ----
[[tasks]]
name = "kp"
kind = "regression"
dataset = "phonix"
column = "kp (normalized)"

[[tasks]]
name = "klat"
kind = "regression"
dataset = "phonix"
column = "klat (normalized)"

# ---- qc kernel regression (7) ----
[[tasks]]
name = "magnetic_susceptibility"
kind = "kernel_regression"
dataset = "qc"
column = "Magnetic susceptibility (normalized)"
t_column = "Magnetic susceptibility (T/K)"

[[tasks]]
name = "zt"
kind = "kernel_regression"
dataset = "qc"
column = "ZT (normalized)"
t_column = "ZT (T/K)"

[[tasks]]
name = "power_factor"
kind = "kernel_regression"
dataset = "qc"
column = "Power factor (normalized)"
t_column = "Power factor (T/K)"

[[tasks]]
name = "thermal_conductivity"
kind = "kernel_regression"
dataset = "qc"
column = "Thermal conductivity (normalized)"
t_column = "Thermal conductivity (T/K)"

[[tasks]]
name = "electrical_resistivity"
kind = "kernel_regression"
dataset = "qc"
column = "Electrical resistivity (normalized)"
t_column = "Electrical resistivity (T/K)"

[[tasks]]
name = "dos_density"
kind = "kernel_regression"
dataset = "qc"
column = "DOS density (normalized)"
t_column = "DOS energy"

[[tasks]]
name = "seebeck"
kind = "kernel_regression"
dataset = "qc"
column = "Seebeck coefficient (normalized)"
t_column = "Seebeck coefficient (T/K)"

# ---- qc classification (1) ----
[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 128
encoder_hidden_dims = [256]
head_hidden_dims = [64]
kr_x_hidden_dims = [128, 64]
kr_t_hidden_dims = [16, 8]
n_kernel = 15

[training]
max_epochs = 100
encoder_lr = 5e-3
head_lr = 5e-3
kr_lr = 5e-4
kr_weight_decay = 5e-5
ae_lr = 5e-3
accelerator = "gpu"
devices = 1
seed = 2025

[training.early_stopping]
enabled = true
monitor = "val_final_loss"
mode = "min"
patience = 8
min_delta = 1e-4

[training.logging]
csv = true

[finetune]
tasks = [
    "dielectric_total",
    "dielectric_ionic",
    "dielectric_electronic",
]
epochs = 100
freeze_encoder = true
add_new_tasks = true

[output]
dir = "artifacts/task_scaling/ft_adhoc"
