# Smoke-test config for `fm finetune` — fine-tune one head on a pretrain-smoke checkpoint.
#
# The catalog + model dims match samples/pretrain_smoke.toml so the checkpoint loads cleanly.
#
#   fm finetune --config samples/finetune_smoke.toml \
#       --checkpoint artifacts/pretrain_smoke/runs/run00/training/final_model.pt

[data]
composition_column = "composition"
batch_size = 64

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"
sample = 300

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 32
encoder_hidden_dims = [64]
head_hidden_dims = [32]
n_kernel = 8

[training]
max_epochs = 100
accelerator = "cpu"
devices = "auto"
seed = 2025
head_lr = 5e-3
ae_lr = 5e-3

[training.early_stopping]
patience = 3

[finetune]
checkpoint = "artifacts/pretrain_smoke/runs/run00/training/final_model.pt"
tasks = ["formation_energy"]
epochs = 2
freeze_encoder = true

[output]
dir = "artifacts/finetune_smoke"
