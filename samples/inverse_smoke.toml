# Smoke-test config for `fm inverse` — one scenario, 2 paths, on a smoke checkpoint.
#
# Catalog + model dims match samples/pretrain_smoke.toml. The checkpoint must contain a head for
# every task named in the scenario's [[inverse.scenarios.targets]] entries.
#
#   fm inverse --config samples/inverse_smoke.toml \
#       --checkpoint artifacts/finetune_smoke/training/final_model.pt

[data]
composition_column = "composition"
batch_size = 64

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"
sample = 300

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 32
encoder_hidden_dims = [64]
head_hidden_dims = [32]
n_kernel = 8

[inverse]
checkpoint = "artifacts/finetune_smoke/training/final_model.pt"
steps = 5
lr = 0.05
record_trajectory = true
animation_formats = []

[inverse.seeds]
strategy = "top_objective"
n = 4
split = "test"

[[inverse.scenarios]]
name = "scenario_fe_down_density_up"

[[inverse.scenarios.targets]]
task = "formation_energy"
value = -2.0

[[inverse.scenarios.targets]]
task = "density"
direction = "high"

[[inverse.scenarios.targets]]
task = "material_type"
classes = [1]
weight = 5.0

[[inverse.paths]]
name = "latent_align1"
method = "latent"
ae_align_scale = 1.0

[[inverse.paths]]
name = "comp_seed_blend95"
method = "composition"
init = "seed"
seed_blend = 0.95

[output]
dir = "artifacts/inverse_smoke"
