# Formal `fm predict` config — evaluate a checkpoint on the test split. Catalog + model dims
# match samples/pretrain.toml.
#
#   fm predict --config samples/predict.toml \
#       --checkpoint artifacts/finetune/training/final_model.pt

[data]
composition_column = "composition"
batch_size = 256

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 128
encoder_hidden = 256
head_hidden_dim = 64
n_kernel = 15

[predict]
checkpoint = "artifacts/finetune/training/final_model.pt"
tasks = []          # empty → every head in the checkpoint
split = "test"
with_metrics = true

[output]
dir = "artifacts/predict"
