# Formal `fm pretrain` config — continual-rehearsal pre-training over the qc dataset.
#
# 2 regression + 2 kernel-regression + 1 classification head, KMD-1d descriptors, a single full
# run with interval=1 rehearsal. Extend `[datasets]` / `[[tasks]]` to add NEMAD / phonix property
# heads (raw columns should be pre-normalized before use).
#
#   fm pretrain --config samples/pretrain.toml

[data]
composition_column = "composition"
val_split = 0.1
test_split = 0.1
split_random_seed = 42
batch_size = 256
num_workers = 0

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "dos_density"
kind = "kernel_regression"
dataset = "qc"
column = "DOS density (normalized)"
t_column = "DOS energy"
# Per-task architecture overrides win over the [model] defaults below (unset → default):
x_hidden_dims = [256, 128]   # value branch: latent_dim -> 256 -> 128
t_hidden_dims = [32, 16]     # coordinate branch: t -> 32 -> 16
n_kernel = 20

[[tasks]]
name = "power_factor"
kind = "kernel_regression"
dataset = "qc"
column = "Power factor (normalized)"
t_column = "Power factor (T/K)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

# Model architecture. The *_hidden_dims lists are the HIDDEN layer widths; the input
# (descriptor width for the encoder, latent_dim for the heads) is prepended automatically and
# the output (1 / num_classes / kernel projection) is appended. Each [[tasks]] may override its
# own head via hidden_dims (reg/clf) or x_hidden_dims / t_hidden_dims / n_kernel (KR).
[model]
latent_dim = 128
encoder_hidden_dims = [256]      # encoder: descriptor_dim -> 256 -> latent_dim
head_hidden_dims = [64]          # reg/clf heads: latent_dim -> 64 -> out
kr_x_hidden_dims = [128, 64]     # KR value branch default: latent_dim -> 128 -> 64
kr_t_hidden_dims = [16, 8]       # KR coordinate branch default: t -> 16 -> 8
n_kernel = 15                    # KR kernel centers default

[training]
max_epochs = 100
encoder_lr = 5e-3
head_lr = 5e-3
kr_lr = 5e-4
kr_weight_decay = 5e-5
ae_lr = 5e-3
accelerator = "auto"
devices = "auto"   # "auto" = all devices for the accelerator; or an int count, a list ([1, 3]), or "1,3"
seed = 2025

# Lightning EarlyStopping (a subset of its args; enabled by default).
[training.early_stopping]
enabled = true
monitor = "val_final_loss"
mode = "min"
patience = 8
min_delta = 1e-4

# Lightning ModelCheckpoint (off by default — the run recorder already writes checkpoints).
# Enable to also emit Lightning .ckpt files (per training step, under stepNN_*/lightning/).
[training.checkpoint]
enabled = false
monitor = "val_final_loss"
mode = "min"
save_top_k = 1
save_last = false

# Lightning loggers — write metric curves under <output.dir>/logs/.
[training.logging]
csv = true
tensorboard = false

[pretrain]
task_sequence = ["density", "dos_density", "power_factor", "formation_energy", "material_type"]
n_runs = 1
task_order = "fixed"

[pretrain.rehearsal]
interval = 1
default_replay = 0.05

[output]
dir = "artifacts/pretrain"
