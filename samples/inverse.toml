# Formal `fm inverse` config — 3 scenarios over the default 11 algorithm paths (omit
# [[inverse.paths]] to get DEFAULT_PATHS: 3 latent + 8 composition). Catalog + model dims match
# samples/pretrain.toml. The checkpoint must contain a head for every task named in the
# scenarios' [[inverse.scenarios.targets]] entries.
#
#   fm inverse --config samples/inverse.toml \
#       --checkpoint artifacts/finetune/training/final_model.pt

[data]
composition_column = "composition"
batch_size = 256

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "dos_density"
kind = "kernel_regression"
dataset = "qc"
column = "DOS density (normalized)"
t_column = "DOS energy"

[[tasks]]
name = "power_factor"
kind = "kernel_regression"
dataset = "qc"
column = "Power factor (normalized)"
t_column = "Power factor (T/K)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 128
encoder_hidden_dims = [256]
head_hidden_dims = [64]
n_kernel = 15

[inverse]
checkpoint = "artifacts/finetune/training/final_model.pt"
steps = 300
lr = 0.05
record_trajectory = true
per_seed_trajectories = false
animation_formats = ["gif"]

[inverse.seeds]
strategy = "top_objective"  # rank candidates by the scenario's objective score (lower = better)
n = 20
split = "test"
dedup_by_element_system = true

# Targets are fully user-specified, one [[inverse.scenarios.targets]] per objective term:
#   regression        → value = <float>  OR  direction = "high"/"low" (unbounded push)
#   kernel_regression → points = [[t, y], ...] (a target curve)
#   classification    → classes = [..] (+ direction, default "high"); optional, no default task
# Every target takes weight (> 0, default 1.0) to balance the terms.

[[inverse.scenarios]]
name = "scenario1_fe_down_density_up"

[[inverse.scenarios.targets]]
task = "formation_energy"
value = -2.0

[[inverse.scenarios.targets]]
task = "density"
value = 2.0

[[inverse.scenarios.targets]]
task = "material_type"
classes = [1]
weight = 5.0  # reproduces the old class_weight = 5.0 behavior

[[inverse.scenarios]]
name = "scenario2_fe_down_pf_curve"

[[inverse.scenarios.targets]]
task = "formation_energy"
value = -2.0

[[inverse.scenarios.targets]]
task = "power_factor"
points = [[0.2, 1.0], [0.5, 1.5], [0.8, 1.0]]  # (t, y) in the task's normalized units

[[inverse.scenarios]]
name = "scenario3_density_up"

[[inverse.scenarios.targets]]
task = "density"
direction = "high"  # direction-only: push ŷ up, no fixed value

# [[inverse.paths]] omitted → DEFAULT_PATHS (3 latent + 8 composition).

[output]
dir = "artifacts/inverse"
