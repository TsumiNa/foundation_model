# Continual multi-task rehearsal + inverse-design — FULL / formal run.
#
# 24 supervised tasks over 4 inorganic datasets + always-on autoencoder:
#   qc_ac_te_mp : 9 regression + 7 kernel regression + 1 classification
#   phonix-db   : 2 regression (kp, klat)
#   NEMAD sc    : 1 regression (tc)
#   NEMAD mag   : 4 regression (magnetic_moment, magnetization, curie, neel)
#
# Tasks are added incrementally. The fixed tail (formation_energy, magnetic_moment, tc, klat,
# material_type) is trained last and, when later replayed as an old task, keeps replay_ratio_high
# (10%) of its labels; every other learned task keeps replay_ratio (5%). No layers are frozen —
# the shared encoder + all active heads train jointly each step. EarlyStopping on val_final_loss
# means max_epochs_per_step is only a ceiling. The same final model is then optimized toward 3
# independent inverse-design scenarios (QC probability primary).
#
#   ./run_continual_rehearsal_full.sh samples/continual_rehearsal_full_config.toml
#
# sample_per_dataset = null uses every row (formal run); set an integer to cap per dataset (smoke).

qc_data_path = "data/qc_ac_te_mp_dos_reformat_20260515.pd.parquet"
qc_preprocessing_path = ""                                  # no matching pkl for 20260515 → skip dropped_idx
superconductor_path = "data/NEMAD_superconductor_20260425.parquet"
magnetic_path = "data/NEMAD_magnetic_20260419.parquet"
phonix_path = "data/phonix-db-filtered_20260425.parquet"
output_dir = "artifacts/continual_rehearsal_full"

# Three-segment order to minimise total replay cost:
#   1) 12 regression (any order; grouped by dataset for readability)
#   2) 7 kernel regression ascending by non-null row count — kr training is expensive per row,
#      so small kr's are introduced earlier (cheap at 100% mask) and then replayed cheaply (5%
#      of a small set), while big kr's land late so they're replayed for fewer subsequent steps.
#   3) 5 fixed tail (inverse-design heads, kept freshest; material_type last → QC clf newest).
task_sequence = [
    # --- 12 regression (any order) ---
    "density", "efermi", "final_energy", "total_magnetization", "volume",
    "dielectric_total", "dielectric_ionic", "dielectric_electronic",   # 8 qc reg
    "magnetization", "curie", "neel",                                  # 3 magnetic (non-tail)
    "kp",                                                              # 1 phonix (non-tail)
    # --- 7 kernel regression, ascending by non-null row count ---
    # magnetic_susceptibility 98 → zt 4971 → power_factor 5223 → thermal_conductivity 6158
    # → electrical_resistivity 7334 → dos_density 10321 → seebeck 11722
    "magnetic_susceptibility", "zt", "power_factor", "thermal_conductivity",
    "electrical_resistivity", "dos_density", "seebeck",
    # --- 5 fixed tail (inverse-design heads, freshest at the end) ---
    "formation_energy", "magnetic_moment", "tc", "klat", "material_type",
]
fixed_tail = ["formation_energy", "magnetic_moment", "tc", "klat", "material_type"]
replay_ratio = 0.05
replay_ratio_high = 0.10
# sample_per_dataset = 12000  # uncomment to cap rows per dataset for a faster run

max_epochs_per_step = 100
early_stop_patience = 8
early_stop_min_delta = 1e-4
batch_size = 256
n_grids = 8
latent_dim = 128
encoder_hidden = 256
head_hidden_dim = 64
head_lr = 0.005
encoder_lr = 0.005
n_kernel = 15
kr_lr = 5e-4
kr_decay = 5e-5

# Inverse design (mirrors the PR #18 demo's paper_inverse_comparison.py).
# Each scenario walks 8 configurations on the same seeds:
#   3 latent rows  — ae_align_scale ∈ {0, 0.25, 1} (failure / mid / max alignment)
#   5 composition rows — strict seed / blend / blend+palette / blend+palette+low diversity / random
# Every per-config knob (ae_align_scale, seed_blend, diversity_scale) is fixed in
# ``INVERSE_PATH_CONFIGS`` at the module level so the ablation is stable across runs; only the
# palette is overridable here for the rows that whitelist elements.
inverse_n_seeds = 20                                        # 17 top-QC dedup + 3 explicit Au-Ga-Ln
inverse_steps = 300
inverse_lr = 0.05
inverse_class_weight = 5.0                                  # QC probability is the primary objective
inverse_seed_strategy = "top_qc"
# Use the **test** split for seed selection: the model has seen the train compositions during
# training, so its top-QC ranking on train is part memorisation; test compositions are held out,
# so the ranking is a genuine prediction → seeds are real novel QC candidates, not training data
# the model already saw. (The demo / paper run defaulted to "train" because it was a self-
# contained baseline; the formal full run wants held-out candidates.)
inverse_seed_split = "test"
# Three Au-Ga-Ln formers appended to top-QC seeds (strategy budget reduced by 3).
inverse_seed_explicit_append = ["Au65 Ga20 Gd15", "Au65 Ga20 Tb15", "Au65 Ga20 Dy15"]
# 48-element alloy palette (plan §5, extended 2026-05 with the full Hf–Pt 5d TM row) — restricts
# the C-alloy composition path. Covers classic i-QC / d-QC formers, group 13/14 enablers, the
# full 4th/5th-period TMs (Tc excluded), the full 6th-period TMs (Hf–Au), and easy lanthanides
# (Pm/Tm/Lu excluded). Keep aligned with ``ALLOY_PALETTE`` in ``continual_rehearsal_full.py``.
inverse_composition_allowed_elements = [
    "Mg", "Ca",
    "B", "Al", "Ga", "In", "Tl",
    "Si", "Ge",
    "Sc", "Ti", "V", "Cr", "Mn", "Fe", "Co", "Ni", "Cu", "Zn",
    "Y", "Zr", "Nb", "Mo", "Ru", "Rh", "Pd", "Ag", "Cd",
    "Hf", "Ta", "W", "Re", "Os", "Ir", "Pt", "Au",
    "La", "Ce", "Pr", "Nd", "Sm", "Eu", "Gd", "Tb", "Dy", "Ho", "Er", "Yb",
]

random_seed = 2025
datamodule_random_seed = 42
accelerator = "mps"
devices = 1
num_workers = 0

# Three independent inverse-design scenarios; primary objective (QC ↑) is implicit for all.
# reg_targets are in normalized / z-scored space: -2.0 ≈ low, +2.0 ≈ high.
# NOTE: array-of-tables must come LAST in the file — any top-level key after a [[...]] header
# would be absorbed into that table by TOML rules.
[[inverse_scenarios]]
name = "scenario1_fe_down_moment_up"
reg_tasks = ["formation_energy", "magnetic_moment"]
reg_targets = [-2.0, 2.0]

[[inverse_scenarios]]
name = "scenario2_fe_tc_moment"
reg_tasks = ["formation_energy", "tc", "magnetic_moment"]
reg_targets = [-2.0, 2.0, 2.0]

[[inverse_scenarios]]
name = "scenario3_fe_down_klat_up"
reg_tasks = ["formation_energy", "klat"]
reg_targets = [-2.0, 2.0]
