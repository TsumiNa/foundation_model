# Formal `fm finetune` config — frozen-encoder fine-tuning of selected heads on a pretrain
# checkpoint. Catalog + model dims match samples/pretrain.toml.
#
#   fm finetune --config samples/finetune.toml \
#       --checkpoint artifacts/pretrain/training/final_model.pt

[data]
composition_column = "composition"
batch_size = 256

[descriptor]
kind = "kmd"
n_grids = 8

[datasets.qc]
path = "data/qc_ac_te_mp_dos_reformat_20250615_enforce_quaternary_test.pd.parquet"
preprocessing_path = "data/preprocessing_objects_20250615.pkl.z"

[[tasks]]
name = "density"
kind = "regression"
dataset = "qc"
column = "Density (normalized)"

[[tasks]]
name = "formation_energy"
kind = "regression"
dataset = "qc"
column = "Formation energy per atom (normalized)"

[[tasks]]
name = "dos_density"
kind = "kernel_regression"
dataset = "qc"
column = "DOS density (normalized)"
t_column = "DOS energy"

[[tasks]]
name = "power_factor"
kind = "kernel_regression"
dataset = "qc"
column = "Power factor (normalized)"
t_column = "Power factor (T/K)"

[[tasks]]
name = "material_type"
kind = "classification"
dataset = "qc"
column = "Material type (label)"
num_classes = 5

[model]
latent_dim = 128
encoder_hidden = 256
head_hidden_dim = 64
n_kernel = 15

[training]
max_epochs = 100
accelerator = "auto"
devices = 1
seed = 2025
head_lr = 5e-3
ae_lr = 5e-3

[training.early_stopping]
patience = 8

[training.logging]
csv = true

[finetune]
checkpoint = "artifacts/pretrain/training/final_model.pt"
tasks = ["formation_energy", "material_type"]
epochs = 30
freeze_encoder = true

[output]
dir = "artifacts/finetune"
